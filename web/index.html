<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- SEO de base -->
  <title>Adfoot — Talents du football</title>
  <meta
    name="description"
    content="Adfoot met en avant les jeunes talents du football : publiez vos vidéos, gagnez en visibilité auprès des clubs, agents et recruteurs, et échangez directement."
  />
  <link rel="canonical" href="https://adfoot.org/" />

  <!-- Open Graph (partage réseaux sociaux) -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://adfoot.org/" />
  <meta property="og:title" content="Adfoot — Talents du football" />
  <meta
    property="og:description"
    content="Découvrez, évaluez et contactez les jeunes talents grâce à leurs vidéos."
  />
  <meta property="og:image" content="icons/og-image.png" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Adfoot — Talents du football" />
  <meta
    name="twitter:description"
    content="La plateforme qui connecte les talents, les clubs et les recruteurs."
  />
  <meta name="twitter:image" content="icons/og-image.png" />

  <!-- Perf -->
  <link rel="preconnect" href="https://www.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://www.googleapis.com" crossorigin />

  <!-- PWA / Web App -->
  <meta name="theme-color" content="#2ED573" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <meta name="apple-mobile-web-app-title" content="Adfoot" />

  <!-- Manifest & Icons -->
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="apple-touch-icon" href="icons/Icon-192.png" />

  <!-- Flutter base href -->
  <base href="/" />

  <!-- Flutter build styles, if any -->
  <!-- <link rel="stylesheet" href="styles.css" /> -->

</head>
<body>
  <noscript>
    Cette application nécessite JavaScript pour fonctionner.
  </noscript>

  <!-- Service Worker pour FCM (Firebase Cloud Messaging) -->
  <script>
    (function () {
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function () {
          navigator.serviceWorker
            .register('/firebase-messaging-sw.js', {
              scope: '/'
            })
            .then(function(reg) {
              // Enregistrement réussi (optionnel log)
              // console.log('SW FCM registered:', reg);
            })
            .catch(function (e) {
              console.warn('SW FCM register warn:', e);
            });
        });
      }
    })();
  </script>

  <!-- Lancement Flutter -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
