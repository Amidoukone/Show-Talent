// ============================================================================
// Module-level build.gradle (android/app)
// Compatible avec Flutter 3.32.7 / AGP 8.3.0 / Kotlin 1.8.22
// ============================================================================
plugins {
    id "com.android.application"
    // START: FlutterFire Configuration
    id "com.google.gms.google-services"
    // END: FlutterFire Configuration
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace = "com.example.adfoot"
    compileSdk = 35
    ndkVersion = "29.0.13599879"

    defaultConfig {
        applicationId = "com.example.adfoot"
        minSdk = 24
        targetSdk = 35
        versionCode = flutter.versionCode
        versionName = flutter.versionName

        // Firebase + plugins = >64K méthodes
        multiDexEnabled true
    }

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_1_8
        targetCompatibility = JavaVersion.VERSION_1_8
        coreLibraryDesugaringEnabled true
    }

    kotlinOptions {
        jvmTarget = "1.8"
    }

    buildTypes {
        release {
            signingConfig = signingConfigs.debug
            // Pour production, activer les options ci-dessous
            // minifyEnabled true
            // shrinkResources true
            // proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
        debug {
            // Debug standard
        }
    }
}

flutter {
    source = "../.."
}

dependencies {
    // Java 8+ API support
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.5'

    // Multidex runtime pour >64K méthodes
    implementation 'androidx.multidex:multidex:2.0.1'
}
